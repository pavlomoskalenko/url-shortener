app.base-url=${APP_BASE_URL:http://localhost:8080}

spring.application.name=url-shortener

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:url_shortener}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

security.jwt.secret_key=${JWT_SECRET_KEY}
security.jwt.access_token_expiration=900000
security.jwt.refresh_token_expiration=86400000
